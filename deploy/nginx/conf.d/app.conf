# ВНУТРЕННИЙ nginx music-backend (за общим Traefik).
# Домен: appsprobek.shop
#
# TLS, порты 80/443 и HTTP→HTTPS редирект держит Traefik (deploy/edge).
# Здесь — только HTTP на :80 внутри docker-сети: раздача /static/ + прокси на api.

server {
    listen 80;
    listen [::]:80;
    server_name appsprobek.shop www.appsprobek.shop;

    # Security headers (TLS терминируется Traefik, но заголовки доходят до клиента)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Healthcheck без auth
    location /healthz {
        proxy_pass http://api:8000/healthz;
        access_log off;
    }

    location /v1/ {
        proxy_pass http://api:8000/v1/;
    }

    # Статика — beats и samples, скачанные локально (см. /opt/music-backend/static/).
    # Раздаётся напрямую nginx'ом, без проксирования. Кешируется CDN/клиентом 30 дней.
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        # Запрещаем listing
        autoindex off;
        # Аудио content-type'ы
        types {
            audio/mpeg          mp3;
            audio/wav           wav;
            audio/mp4           m4a;
            audio/ogg           ogg;
            audio/flac          flac;
        }
        # 404 если файла нет (вместо default index.html)
        try_files $uri =404;
    }

    # Swagger UI / ReDoc / OpenAPI JSON
    location = /docs {
        proxy_pass http://api:8000/docs;
    }
    location = /redoc {
        proxy_pass http://api:8000/redoc;
    }
    location = /openapi.json {
        proxy_pass http://api:8000/openapi.json;
    }

    location / {
        return 404;
    }
}
