# Production-конфиг nginx для music-backend.
# Домен: appsprobek.shop
#
# Конфиг ожидает наличие SSL-сертификатов в
# /etc/letsencrypt/live/appsprobek.shop/ — выпустить через
# ./scripts/init-letsencrypt.sh.

server {
    listen 80;
    listen [::]:80;
    server_name appsprobek.shop www.appsprobek.shop;

    # ACME-challenge (certbot webroot) — должен быть доступен по HTTP всегда
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name appsprobek.shop www.appsprobek.shop;

    ssl_certificate     /etc/letsencrypt/live/appsprobek.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appsprobek.shop/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/appsprobek.shop/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Healthcheck без auth
    location /healthz {
        proxy_pass http://api:8000/healthz;
        access_log off;
    }

    # API (ТЗ §9 — все эндпоинты под /v1/)
    location /v1/ {
        proxy_pass http://api:8000/v1/;
    }

    # Swagger UI / ReDoc / OpenAPI JSON
    location = /docs {
        proxy_pass http://api:8000/docs;
    }
    location = /redoc {
        proxy_pass http://api:8000/redoc;
    }
    location = /openapi.json {
        proxy_pass http://api:8000/openapi.json;
    }

    location / {
        return 404;
    }
}
