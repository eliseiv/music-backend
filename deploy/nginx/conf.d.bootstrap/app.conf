# Bootstrap-конфиг — используется ТОЛЬКО при первом запуске
# (до выпуска SSL-сертификатов). После init-letsencrypt.sh подменяется
# на conf.d/app.conf с HTTPS.
# Домен: appsprobek.shop
server {
    listen 80;
    listen [::]:80;
    server_name appsprobek.shop www.appsprobek.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 200 'OK (bootstrap, awaiting LE certificate)';
        add_header Content-Type text/plain;
    }
}
