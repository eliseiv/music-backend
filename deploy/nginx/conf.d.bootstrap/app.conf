# Этот конфиг используется ТОЛЬКО при первом запуске (до выпуска сертификатов).
# После init-letsencrypt.sh подменяется на conf.d/app.conf с HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name appstorepro.store www.appstorepro.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 200 'OK (bootstrap, awaiting LE certificate)';
        add_header Content-Type text/plain;
    }
}
