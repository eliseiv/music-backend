# Production compose для music-backend.
# Используется на сервере как /opt/music-backend/docker-compose.yml.
# Build api делается на сервере (`docker compose build api`) — без registry.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-music}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-music}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-music} -d ${POSTGRES_DB:-music}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./repo
      dockerfile: Dockerfile
    image: music-backend-api:local
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-music}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-music}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # nginx здесь — ВНУТРЕННИЙ: раздаёт /static/ (mp3 битов/сэмплов) и проксирует
  # на api. TLS и публичные порты 80/443 держит общий Traefik (см. deploy/edge).
  # Поэтому никаких ports: и SSL — только HTTP на :80 внутри сети web.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Локальные аудио-файлы (beats + samples), раздаются через /static/
      - ./static:/var/www/static:ro
    depends_on:
      - api
    networks:
      - web
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.music.rule=Host(`appsprobek.shop`) || Host(`www.appsprobek.shop`)"
      - "traefik.http.routers.music.entrypoints=websecure"
      - "traefik.http.services.music.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  web:
    external: true
  default:

volumes:
  pgdata:
