name: Deploy to server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy (git pull + docker compose build)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Run remote deploy
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR || '/opt/music-backend' }}
          BRANCH: ${{ github.ref_name }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s <<EOF
            set -euo pipefail
            cd "$DEPLOY_DIR/repo"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            # Если в репо обновился deploy/ — синхронизируем (сохраняя certbot/,
            # .env, static/ — пользовательский контент и репо).
            cd "$DEPLOY_DIR"
            rsync -a --delete \
              --exclude='/certbot' \
              --exclude='/.env' \
              --exclude='/repo' \
              --exclude='/static' \
              --exclude='/backups' \
              ./repo/deploy/ ./
            bash scripts/deploy.sh
          EOF

      - name: Smoke test
        env:
          DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
        run: |
          if [ -z "$DOMAIN" ]; then
            echo "DEPLOY_DOMAIN secret не задан — пропускаю внешний smoke"
            exit 0
          fi
          for i in $(seq 1 30); do
            if curl -fsS "https://$DOMAIN/healthz"; then
              echo ""
              echo "Smoke OK"
              exit 0
            fi
            sleep 3
          done
          echo "Smoke FAILED"
          exit 1
