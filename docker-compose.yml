services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aibased
      POSTGRES_PASSWORD: aibased
      POSTGRES_DB: aibased
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibased -d aibased"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aibased:aibased@postgres:5432/aibased
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
